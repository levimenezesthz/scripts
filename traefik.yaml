version: "3.7"

services:

  traefik:
    image: traefik:2
    command:
      - "--api.dashboard=true"
      - "--providers.docker.swarmMode=true"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=publica"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.traefikresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.traefikresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.traefikresolver.acme.email=suporte.exceler@gmail.com"
      - "--certificatesresolvers.traefikresolver.acme.storage=/etc/traefik/traefikresolver/acme.json"
      - "--log.level=WARN"
      - "--log.format=common"
      - "--log.filePath=/etc/traefik/log/traefik/traefik.log"
      - "--accesslog=true"
      - "--accesslog.filepath=/etc/traefik/log/traefik/access-log"
    deploy:
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=publica"
        - "traefik.http.routers.traefik.rule=Host(`traefik.exceler.tec.br`)"
        - "traefik.http.routers.traefik.entrypoints=websecure"
        - "traefik.http.routers.traefik.service=api@internal"
        - "traefik.http.routers.traefik.tls.certresolver=traefikresolver"
        - "traefik.http.routers.traefik.priority=1"
        #- "traefik.http.routers.traefik.middlewares=redirect-https@docker"
        #- "traefik.http.routers.traefik.rule=hostregexp(`{host:.+}`)"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      #- "/etc/localtime:/etc/localtime"
      - "traefik_config:/etc/traefik/"
      - "traefik_certificados:/etc/traefik/traefikresolver/" 
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    networks:
      - public

volumes:
  traefik_config:
    external: true
    name: traefik_config
  traefik_certificados:
    external: true
    name: traefik_certificados

networks:
  publica:
    external: true
    name: publica
